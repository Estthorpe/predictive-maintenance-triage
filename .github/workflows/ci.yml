name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      # Regenerate the synthetic dataset so the clean runner has data to test
      # against. Deterministic (seeded) -> identical bytes every run.
      - name: Generate dataset
        run: python scripts/generate_sensor_data.py

      - name: Lint (Ruff)
        run: ruff check .

      # This runs the full suite INCLUDING the evaluation gate on real data.
      # A model that fails recall@K / FP budget / baseline will fail here and
      # block the merge.
      - name: Run tests + evaluation gate (Pytest)
        run: pytest -v
