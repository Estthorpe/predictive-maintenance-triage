name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      # Regenerate the synthetic dataset (deterministic/seeded).
      - name: Generate dataset
        run: python scripts/generate_sensor_data.py

      # Train + save the model artifact so the serving tests can load it.
      - name: Train model artifact
        run: python scripts/train_and_save_model.py

      - name: Lint (Ruff)
        run: ruff check .

      - name: Run tests + evaluation gate (Pytest)
        run: pytest -v
